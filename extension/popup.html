<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #0f0f0f;
      color: #f5f5f5;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .badge {
      font-size: 10px;
      background: #7c3aed;
      color: white;
      padding: 2px 6px;
      border-radius: 20px;
    }
    .content { padding: 16px; }
    .page-title {
      font-size: 13px;
      font-weight: 500;
      color: #e5e5e5;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .page-url {
      font-size: 11px;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 16px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.1s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-secondary { background: #1a1a1a; color: #999; border: 1px solid #333; margin-top: 8px; }
    .status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
    }
    .status.success { background: #052e16; color: #4ade80; }
    .status.error { background: #2d0a0a; color: #f87171; }
    .workspace-select {
      width: 100%;
      padding: 8px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 13px;
      margin-bottom: 12px;
      appearance: none;
    }
    .label { font-size: 11px; color: #666; margin-bottom: 6px; }
    .not-logged-in { padding: 24px 16px; text-align: center; }
    .not-logged-in p { color: #666; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Clipflow</span>
    <span class="badge">Extension</span>
  </div>
  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
